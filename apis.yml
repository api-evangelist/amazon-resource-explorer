aid: amazon-resource-explorer
name: Amazon Resource Explorer
description: >-
  AWS Resource Explorer is a resource search and discovery service. With
  Resource Explorer, you can explore your resources across AWS Regions using
  an internet search-like experience. It provides a unified view of your AWS
  resources and helps you understand your resource inventory.
type: Index
